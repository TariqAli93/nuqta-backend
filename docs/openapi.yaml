##############################################################################
# Nuqta Backend — OpenAPI 3.0 Specification
# Generated from Full API Endpoint Map — UI
# All endpoints under /api/v1
##############################################################################
openapi: "3.0.3"
info:
  title: Nuqta Backend API
  version: 1.0.0
  description: |
    REST JSON API for Nuqta POS / ERP system.
    All responses use the standard envelope:
    - Success: `{ ok: true, data: T }`
    - Error:   `{ ok: false, error: { code, message, details?, status? } }`
  contact:
    name: Nuqta Dev Team

servers:
  - url: /api/v1
    description: API v1 base path

# ─── Security Schemes ──────────────────────────────────────────────────
security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT HS256 token.
        Access token TTL: 15 min (900s).
        Refresh token TTL: 7 days (604800s).
        Header: `Authorization: Bearer <accessToken>`

  # ─── Reusable Schemas ─────────────────────────────────────────────
  schemas:
    # ── Envelope ──
    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code
          enum:
            - VALIDATION_ERROR
            - UNAUTHORIZED
            - FORBIDDEN
            - NOT_FOUND
            - CONFLICT
            - IDEMPOTENCY_REPLAY
            - INSUFFICIENT_STOCK
            - INVALID_STATE
            - INTERNAL_ERROR
        message:
          type: string
        details:
          description: Additional context (validation field errors, etc.)
        status:
          type: integer

    ErrorEnvelope:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          $ref: "#/components/schemas/ApiError"

    # ── Pagination ──
    PaginatedMeta:
      type: object
      properties:
        items:
          type: array
          items: {}
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # ── Auth ──
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string, minLength: 1 }
        password: { type: string, minLength: 1 }
      additionalProperties: false

    RegisterRequest:
      type: object
      required: [username, password, fullName]
      properties:
        username: { type: string, minLength: 1 }
        password: { type: string, minLength: 6 }
        fullName: { type: string, minLength: 1 }
        phone: { type: string, nullable: true }
      additionalProperties: false

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword: { type: string, minLength: 1 }
        newPassword: { type: string, minLength: 6 }
      additionalProperties: false

    UserSafe:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        fullName: { type: string }
        phone: { type: string, nullable: true }
        role: { type: string, enum: [admin, cashier, manager, viewer] }
        isActive: { type: boolean }
        lastLoginAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time, nullable: true }

    LoginData:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        user: { $ref: "#/components/schemas/UserSafe" }
        permissions: { type: array, items: { type: string } }

    SetupStatus:
      type: object
      properties:
        hasUsers: { type: boolean }
        isSetupComplete: { type: boolean }

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string }
      additionalProperties: false

    RefreshData:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }

    # ── Category ──
    Category:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
        parentId: { type: integer, nullable: true }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time, nullable: true }

    CreateCategoryRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string, nullable: true }
        parentId: { type: integer, nullable: true }
      additionalProperties: false

    UpdateCategoryRequest:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string, nullable: true }
        parentId: { type: integer, nullable: true }
        isActive: { type: boolean }
      additionalProperties: false

    # ── Product ──
    Product:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        sku: { type: string, nullable: true }
        barcode: { type: string, nullable: true }
        categoryId: { type: integer, nullable: true }
        description: { type: string, nullable: true }
        costPrice: { type: integer, description: "Minor units (IQD)" }
        sellingPrice: { type: integer }
        currency: { type: string }
        stock: { type: integer }
        minStock: { type: integer }
        unit: { type: string }
        supplier: { type: string, nullable: true }
        supplierId: { type: integer, nullable: true }
        expireDate: { type: string, nullable: true }
        isExpire: { type: boolean }
        status: { type: string, enum: [available, out_of_stock, discontinued] }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time, nullable: true }
        createdBy: { type: integer, nullable: true }

    CreateProductRequest:
      type: object
      required: [name, costPrice, sellingPrice]
      properties:
        name: { type: string, minLength: 1 }
        sku: { type: string, nullable: true }
        barcode: { type: string, nullable: true }
        categoryId: { type: integer, nullable: true }
        description: { type: string, nullable: true }
        costPrice: { type: integer, minimum: 0 }
        sellingPrice: { type: integer, minimum: 0 }
        currency: { type: string, default: IQD }
        stock: { type: integer, minimum: 0, default: 0 }
        minStock: { type: integer, minimum: 0, default: 0 }
        unit: { type: string, default: piece }
        supplier: { type: string, nullable: true }
        supplierId: { type: integer, nullable: true }
        expireDate: { type: string, format: date-time, nullable: true }
        isExpire: { type: boolean, default: false }
        status: { type: string, enum: [available, out_of_stock, discontinued], default: available }
        isActive: { type: boolean, default: true }

    UpdateProductRequest:
      type: object
      properties:
        name: { type: string }
        sku: { type: string, nullable: true }
        barcode: { type: string, nullable: true }
        categoryId: { type: integer, nullable: true }
        description: { type: string, nullable: true }
        costPrice: { type: integer, minimum: 0 }
        sellingPrice: { type: integer, minimum: 0 }
        currency: { type: string }
        stock: { type: integer, minimum: 0 }
        minStock: { type: integer, minimum: 0 }
        unit: { type: string }
        supplier: { type: string, nullable: true }
        supplierId: { type: integer, nullable: true }
        expireDate: { type: string, nullable: true }
        isExpire: { type: boolean }
        status: { type: string, enum: [available, out_of_stock, discontinued] }
        isActive: { type: boolean }

    ProductUnit:
      type: object
      properties:
        id: { type: integer }
        productId: { type: integer }
        name: { type: string }
        factor: { type: number }
        barcode: { type: string, nullable: true }
        isDefault: { type: boolean }
        createdAt: { type: string, format: date-time }

    ProductBatch:
      type: object
      properties:
        id: { type: integer }
        productId: { type: integer }
        batchNumber: { type: string }
        quantity: { type: integer }
        costPrice: { type: integer }
        expiryDate: { type: string, format: date, nullable: true }
        createdAt: { type: string, format: date-time }

    AdjustStockRequest:
      type: object
      required: [quantityChange]
      properties:
        quantityChange: { type: number }
        reason: { type: string, enum: [manual, damage, opening] }
        notes: { type: string, nullable: true }
        batchId: { type: integer, nullable: true }
        unitName: { type: string }
        unitFactor: { type: integer, minimum: 1 }
      additionalProperties: false

    # ── Customer ──
    Customer:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        phone: { type: string, nullable: true }
        address: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        totalDebt: { type: integer }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time, nullable: true }

    CreateCustomerRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        phone: { type: string, nullable: true }
        address: { type: string, nullable: true }
        notes: { type: string, nullable: true }
      additionalProperties: false

    UpdateCustomerRequest:
      type: object
      properties:
        name: { type: string }
        phone: { type: string, nullable: true }
        address: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        isActive: { type: boolean }

    # ── Supplier ──
    Supplier:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        phone: { type: string, nullable: true }
        address: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        totalBalance: { type: integer }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time, nullable: true }

    CreateSupplierRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        phone: { type: string, nullable: true }
        address: { type: string, nullable: true }
        notes: { type: string, nullable: true }
      additionalProperties: false

    UpdateSupplierRequest:
      type: object
      properties:
        name: { type: string }
        phone: { type: string, nullable: true }
        address: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        isActive: { type: boolean }

    # ── Sale ──
    SaleItem:
      type: object
      properties:
        id: { type: integer }
        saleId: { type: integer }
        productId: { type: integer }
        productName: { type: string }
        quantity: { type: integer }
        unitName: { type: string }
        unitFactor: { type: integer }
        quantityBase: { type: integer }
        batchId: { type: integer, nullable: true }
        unitPrice: { type: integer }
        discount: { type: integer }
        subtotal: { type: integer }
        cogs: { type: integer, nullable: true }
        weightedAverageCost: { type: integer, nullable: true }
        createdAt: { type: string, format: date-time }

    Sale:
      type: object
      properties:
        id: { type: integer }
        invoiceNumber: { type: string }
        customerId: { type: integer, nullable: true }
        subtotal: { type: integer }
        discount: { type: integer }
        tax: { type: integer }
        total: { type: integer }
        currency: { type: string }
        exchangeRate: { type: number }
        interestRate: { type: integer }
        interestAmount: { type: integer }
        paymentType: { type: string, enum: [cash, credit, mixed] }
        paidAmount: { type: integer }
        remainingAmount: { type: integer }
        status: { type: string, enum: [pending, completed, cancelled, refunded] }
        notes: { type: string, nullable: true }
        idempotencyKey: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time, nullable: true }
        createdBy: { type: integer, nullable: true }
        items: { type: array, items: { $ref: "#/components/schemas/SaleItem" } }
        cogs: { type: integer, nullable: true }
        totalCogs: { type: integer, nullable: true }
        profit: { type: integer, nullable: true }
        marginBps: { type: integer, nullable: true }

    CreateSaleItem:
      type: object
      required: [productId, quantity, unitPrice]
      properties:
        productId: { type: integer, minimum: 1 }
        quantity: { type: integer, minimum: 1 }
        unitPrice: { type: integer, minimum: 0 }
        discount: { type: integer, minimum: 0 }
        unitName: { type: string }
        unitFactor: { type: integer, minimum: 1 }
        batchId: { type: integer }

    CreateSaleRequest:
      type: object
      required: [items, paymentType]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/CreateSaleItem" }, minItems: 1 }
        customerId: { type: integer }
        discount: { type: integer, minimum: 0 }
        tax: { type: integer, minimum: 0 }
        paymentType: { type: string, enum: [cash, credit, mixed] }
        paidAmount: { type: integer, minimum: 0 }
        currency: { type: string }
        notes: { type: string }
        interestRate: { type: integer }
        interestRateBps: { type: integer }
        paymentMethod: { type: string, enum: [cash, card, bank_transfer, credit] }
        referenceNumber: { type: string }
        idempotencyKey: { type: string }
      additionalProperties: false

    AddPaymentRequest:
      type: object
      required: [amount, paymentMethod]
      properties:
        customerId: { type: integer }
        amount: { type: integer, minimum: 1 }
        currency: { type: string }
        exchangeRate: { type: number }
        paymentMethod: { type: string, enum: [cash, card, bank_transfer, credit] }
        referenceNumber: { type: string }
        notes: { type: string }
        idempotencyKey: { type: string }
      additionalProperties: false

    # ── Purchase ──
    Purchase:
      type: object
      properties:
        id: { type: integer }
        invoiceNumber: { type: string }
        supplierId: { type: integer }
        subtotal: { type: integer }
        discount: { type: integer }
        tax: { type: integer }
        total: { type: integer }
        currency: { type: string }
        paidAmount: { type: integer }
        remainingAmount: { type: integer }
        status: { type: string, enum: [pending, completed, cancelled] }
        notes: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time, nullable: true }
        createdBy: { type: integer, nullable: true }
        items: { type: array, items: {} }

    CreatePurchaseRequest:
      type: object
      required: [supplierId, items]
      properties:
        supplierId: { type: integer, minimum: 1 }
        items: { type: array, minItems: 1 }
        discount: { type: integer, minimum: 0 }
        tax: { type: integer, minimum: 0 }
        paidAmount: { type: integer, minimum: 0 }
        paymentMethod: { type: string, enum: [cash, card, bank_transfer, credit] }
        currency: { type: string }
        notes: { type: string }
        idempotencyKey: { type: string }
      additionalProperties: false

    # ── Accounting ──
    Account:
      type: object
      properties:
        id: { type: integer }
        code: { type: string }
        name: { type: string }
        nameAr: { type: string, nullable: true }
        type: { type: string, enum: [asset, liability, equity, revenue, expense] }
        parentId: { type: integer, nullable: true }
        isLeaf: { type: boolean }
        balance: { type: integer }
        currency: { type: string }
        createdAt: { type: string, format: date-time }

    JournalEntry:
      type: object
      properties:
        id: { type: integer }
        entryDate: { type: string, format: date }
        description: { type: string }
        sourceType: { type: string }
        sourceId: { type: integer, nullable: true }
        isPosted: { type: boolean }
        postedAt: { type: string, format: date-time, nullable: true }
        postedBy: { type: integer, nullable: true }
        createdAt: { type: string, format: date-time }
        lines: { type: array, items: {} }

    TrialBalance:
      type: object
      properties:
        accounts: { type: array, items: {} }
        totalDebits: { type: integer }
        totalCredits: { type: integer }
        isBalanced: { type: boolean }

    ProfitLoss:
      type: object
      properties:
        revenue: { type: array, items: {} }
        expenses: { type: array, items: {} }
        totalRevenue: { type: integer }
        totalExpenses: { type: integer }
        netIncome: { type: integer }

    BalanceSheet:
      type: object
      properties:
        assets: { type: array, items: {} }
        liabilities: { type: array, items: {} }
        equity: { type: array, items: {} }
        totalAssets: { type: integer }
        totalLiabilities: { type: integer }
        totalEquity: { type: integer }

    AccountingStatus:
      type: object
      properties:
        isInitialized: { type: boolean }
        accountCount: { type: integer }
        lastInitializedAt: { type: string, format: date-time, nullable: true }

    # ── Posting ──
    PostingBatch:
      type: object
      properties:
        id: { type: integer }
        periodType: { type: string, enum: [day, month, year] }
        periodStart: { type: string, format: date-time }
        periodEnd: { type: string, format: date-time }
        entriesCount: { type: integer }
        totalAmount: { type: integer }
        status: { type: string, enum: [draft, posted, locked] }
        postedAt: { type: string, format: date-time, nullable: true }
        postedBy: { type: integer, nullable: true }
        notes: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    PostPeriodRequest:
      type: object
      required: [periodType, periodStart, periodEnd]
      properties:
        periodType: { type: string, enum: [day, month, year] }
        periodStart: { type: string, format: date }
        periodEnd: { type: string, format: date }
        notes: { type: string }
      additionalProperties: false

    # ── Inventory ──
    InventoryMovement:
      type: object
      properties:
        id: { type: integer }
        productId: { type: integer }
        productName: { type: string }
        movementType: { type: string }
        quantity: { type: integer }
        reason: { type: string, nullable: true }
        referenceId: { type: integer, nullable: true }
        notes: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        createdBy: { type: integer, nullable: true }

    InventoryDashboard:
      type: object
      properties:
        totalProducts: { type: integer }
        lowStockCount: { type: integer }
        outOfStockCount: { type: integer }
        expiringCount: { type: integer }
        totalValue: { type: integer }

    ExpiryAlert:
      type: object
      properties:
        productId: { type: integer }
        productName: { type: string }
        batchId: { type: integer }
        batchNumber: { type: string }
        expiryDate: { type: string, format: date }
        quantity: { type: integer }
        daysUntilExpiry: { type: integer }

    # ── Ledger ──
    LedgerEntry:
      type: object
      properties:
        id: { type: integer }
        type: { type: string }
        amount: { type: integer }
        balance: { type: integer }
        description: { type: string }
        referenceId: { type: integer, nullable: true }
        referenceType: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    RecordPaymentRequest:
      type: object
      required: [amount, paymentMethod]
      properties:
        amount: { type: integer, minimum: 1 }
        paymentMethod: { type: string, enum: [cash, card, bank_transfer] }
        notes: { type: string }
        idempotencyKey: { type: string }
      additionalProperties: false

    LedgerAdjustmentRequest:
      type: object
      required: [amount]
      properties:
        amount: { type: integer }
        notes: { type: string }
      additionalProperties: false

    # ── Dashboard ──
    DashboardStats:
      type: object
      properties:
        totalSalesToday: { type: integer }
        totalSalesMonth: { type: integer }
        totalProducts: { type: integer }
        lowStockCount: { type: integer }
        totalCustomers: { type: integer }
        totalRevenue: { type: integer }
        recentSales: { type: array, items: {} }

    # ── Settings ──
    CompanySettings:
      type: object
      properties:
        companyName: { type: string }
        companyAddress: { type: string, nullable: true }
        companyPhone: { type: string, nullable: true }
        companyEmail: { type: string, nullable: true }
        companyLogo: { type: string, nullable: true }
        taxNumber: { type: string, nullable: true }

    CurrencySettings:
      type: object
      properties:
        defaultCurrency: { type: string }
        supportedCurrencies: { type: array, items: { type: string } }
        exchangeRates: { type: object, additionalProperties: { type: number } }

    ModuleSettings:
      type: object
      additionalProperties: true

    SetupWizardRequest:
      type: object
      properties:
        companyName: { type: string }
        currency: { type: string }
        modules: { type: object }
      additionalProperties: true

    # ── Barcode ──
    BarcodeTemplate:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        width: { type: number }
        height: { type: number }
        fields: { type: array, items: {} }
        createdAt: { type: string, format: date-time }

    BarcodePrintJob:
      type: object
      properties:
        id: { type: integer }
        templateId: { type: integer }
        products: { type: array, items: {} }
        quantity: { type: integer }
        status: { type: string }
        createdAt: { type: string, format: date-time }

    # ── Backup ──
    BackupInfo:
      type: object
      properties:
        name: { type: string }
        size: { type: integer }
        createdAt: { type: string, format: date-time }

    BackupStats:
      type: object
      properties:
        totalBackups: { type: integer }
        lastBackupAt: { type: string, format: date-time, nullable: true }
        totalSize: { type: integer }

    # ── Audit ──
    AuditEvent:
      type: object
      properties:
        id: { type: integer }
        userId: { type: integer, nullable: true }
        action: { type: string }
        entityType: { type: string }
        entityId: { type: integer, nullable: true }
        details: {}
        ipAddress: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    # ── Capabilities ──
    SystemCapabilities:
      type: object
      properties:
        status: { type: string }
        capabilities: { type: array, items: { type: object, properties: { key: { type: string }, enabled: { type: boolean } } } }
        limits: { type: object }
        version: { type: string }
        environment: { type: string }

    # ── Idempotency ──
    IdempotencyHeader:
      description: Idempotency key for write operations
      type: string

  # ─── Reusable Parameters ──────────────────────────────────────────
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema: { type: string, pattern: "^\\d+$" }
      description: Numeric resource ID

    LimitParam:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    OffsetParam:
      name: offset
      in: query
      schema: { type: integer, minimum: 0, default: 0 }
    PageParam:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    SearchParam:
      name: search
      in: query
      schema: { type: string }
    DateFromParam:
      name: dateFrom
      in: query
      schema: { type: string, format: date }
    DateToParam:
      name: dateTo
      in: query
      schema: { type: string, format: date }

    IdempotencyKeyHeader:
      name: X-Idempotency-Key
      in: header
      required: true
      schema: { type: string, format: uuid }
      description: Idempotency key — required for financial write operations

  # ─── Reusable Responses ───────────────────────────────────────────
  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Conflict:
      description: Conflict (duplicate, state mismatch)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    IdempotencyReplay:
      description: Idempotency replay — same response returned
      content:
        application/json:
          schema:
            description: Original response replayed
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }

# ═══════════════════════════════════════════════════════════════════════
# PATHS
# ═══════════════════════════════════════════════════════════════════════
paths:

  # ─── AUTH ─────────────────────────────────────────────────────────
  /auth/login:
    post:
      tags: [Auth]
      summary: User login
      security: []
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: "#/components/schemas/LoginData" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/setup-status:
    get:
      tags: [Auth]
      summary: Check initial setup status
      security: []
      operationId: authSetupStatus
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: "#/components/schemas/SetupStatus" }

  /auth/register:
    post:
      tags: [Auth]
      summary: Register first admin user
      security: []
      operationId: authRegister
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "200":
          description: User created
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: "#/components/schemas/UserSafe" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      operationId: authMe
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: "#/components/schemas/UserSafe" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/change-password:
    post:
      tags: [Auth]
      summary: Change current user password
      operationId: authChangePassword
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChangePasswordRequest" }
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { type: "null" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      operationId: authRefresh
      description: |
        Exchange a valid refresh token for a new access + refresh token pair.
        Returns 401 if refresh token is invalid/expired — client must re-login.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshRequest" }
      responses:
        "200":
          description: New tokens
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: "#/components/schemas/RefreshData" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout (invalidate refresh token)
      operationId: authLogout
      description: Invalidates the refresh token. Client should discard both tokens.
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { type: "null" }

  # ─── PRODUCTS ─────────────────────────────────────────────────────
  /products:
    get:
      tags: [Products]
      summary: List products (paginated)
      operationId: listProducts
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/SearchParam"
        - name: categoryId
          in: query
          schema: { type: integer }
        - name: supplierId
          in: query
          schema: { type: integer }
        - name: status
          in: query
          schema: { type: string, enum: [available, out_of_stock, discontinued] }
        - name: lowStockOnly
          in: query
          schema: { type: boolean }
        - name: expiringSoonOnly
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Paginated product list
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      items: { type: array, items: { $ref: "#/components/schemas/Product" } }
                      total: { type: integer }
                      page: { type: integer }
                      limit: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Products]
      summary: Create product
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateProductRequest" }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: "#/components/schemas/Product" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }

  /products/{id}:
    get:
      tags: [Products]
      summary: Get product by ID
      operationId: getProduct
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: "#/components/schemas/Product" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [Products]
      summary: Update product
      operationId: updateProduct
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateProductRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: "#/components/schemas/Product" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Products]
      summary: Delete product
      operationId: deleteProduct
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { type: "null" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /products/{productId}/purchase-history:
    get:
      tags: [Products]
      summary: Get product purchase history
      operationId: getProductPurchaseHistory
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: integer }
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Purchase history
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      items: { type: array, items: {} }
                      total: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /products/{productId}/sales-history:
    get:
      tags: [Products]
      summary: Get product sales history
      operationId: getProductSalesHistory
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: integer }
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Sales history
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      items: { type: array, items: {} }
                      total: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /products/{productId}/units:
    get:
      tags: [Products]
      summary: List product units
      operationId: listProductUnits
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Product units
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { type: array, items: { $ref: "#/components/schemas/ProductUnit" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [Products]
      summary: Create product unit
      operationId: createProductUnit
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, factor]
              properties:
                name: { type: string }
                factor: { type: number, minimum: 0.001 }
                barcode: { type: string, nullable: true }
      responses:
        "200":
          description: Created unit
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: "#/components/schemas/ProductUnit" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /products/units/{id}:
    put:
      tags: [Products]
      summary: Update product unit
      operationId: updateProductUnit
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                factor: { type: number }
                barcode: { type: string, nullable: true }
      responses:
        "200":
          description: Updated unit
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: "#/components/schemas/ProductUnit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Products]
      summary: Delete product unit
      operationId: deleteProductUnit
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { type: "null" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /products/{productId}/units/{unitId}/set-default:
    post:
      tags: [Products]
      summary: Set default unit for product
      operationId: setDefaultProductUnit
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: integer }
        - name: unitId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Default unit set
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: "#/components/schemas/ProductUnit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /products/{productId}/batches:
    get:
      tags: [Products]
      summary: List product batches
      operationId: listProductBatches
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Product batches
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { type: array, items: { $ref: "#/components/schemas/ProductBatch" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Products]
      summary: Create product batch
      operationId: createProductBatch
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [batchNumber, quantity, costPrice]
              properties:
                batchNumber: { type: string }
                quantity: { type: integer, minimum: 1 }
                costPrice: { type: integer, minimum: 0 }
                expiryDate: { type: string, format: date, nullable: true }
      responses:
        "200":
          description: Created batch
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: "#/components/schemas/ProductBatch" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /products/{productId}/adjust-stock:
    post:
      tags: [Products]
      summary: Adjust product stock
      operationId: adjustProductStock
      description: Used by inventoryClient for manual stock adjustments
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: integer }
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdjustStockRequest" }
      responses:
        "200":
          description: Stock adjusted
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { type: object }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── SALES ────────────────────────────────────────────────────────
  /sales:
    get:
      tags: [Sales]
      summary: List sales (paginated)
      operationId: listSales
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: startDate
          in: query
          schema: { type: string, format: date }
        - name: endDate
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: Paginated sales list
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      items: { type: array, items: { $ref: "#/components/schemas/Sale" } }
                      total: { type: integer }
                      page: { type: integer }
                      limit: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Sales]
      summary: Create sale
      operationId: createSale
      description: |
        Creates a new sale with line items and payment information.
        Requires X-Idempotency-Key header to prevent double sales.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSaleRequest" }
      responses:
        "200":
          description: Sale created
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: "#/components/schemas/Sale" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }

  /sales/{id}:
    get:
      tags: [Sales]
      summary: Get sale by ID
      operationId: getSale
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Sale details
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: "#/components/schemas/Sale" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /sales/{saleId}/payments:
    post:
      tags: [Sales]
      summary: Add payment to sale
      operationId: addSalePayment
      parameters:
        - name: saleId
          in: path
          required: true
          schema: { type: integer }
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddPaymentRequest" }
      responses:
        "200":
          description: Payment recorded
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { type: object }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /sales/{id}/cancel:
    post:
      tags: [Sales]
      summary: Cancel a sale
      operationId: cancelSale
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Sale cancelled
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: "#/components/schemas/Sale" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /sales/{id}/refund:
    post:
      tags: [Sales]
      summary: Refund a sale
      operationId: refundSale
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
                items: { type: array, items: { type: object, properties: { saleItemId: { type: integer }, quantity: { type: integer } } } }
      responses:
        "200":
          description: Sale refunded
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: "#/components/schemas/Sale" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /sales/{id}/receipt:
    get:
      tags: [Sales]
      summary: Get sale receipt data
      operationId: getSaleReceipt
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Receipt data
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    description: Full receipt with company info, sale details, items, payments
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ─── POS ──────────────────────────────────────────────────────────
  /pos/after-pay:
    post:
      tags: [POS]
      summary: Process after-payment POS flow
      operationId: posAfterPay
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: POS after-pay payload (same shape as CreateSaleRequest with POS-specific fields)
      responses:
        "200":
          description: POS sale processed
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { type: object }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ─── CATEGORIES ───────────────────────────────────────────────────
  /categories:
    get:
      tags: [Categories]
      summary: List all categories
      operationId: listCategories
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { type: array, items: { $ref: "#/components/schemas/Category" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Categories]
      summary: Create category
      operationId: createCategory
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCategoryRequest" }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: "#/components/schemas/Category" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /categories/{id}:
    put:
      tags: [Categories]
      summary: Update category
      operationId: updateCategory
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCategoryRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: "#/components/schemas/Category" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Categories]
      summary: Delete category
      operationId: deleteCategory
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { type: "null" }
