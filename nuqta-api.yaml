openapi: 3.0.3
info:
  title: Nuqta API
  description: |-
    Nuqta POS & Inventory Management backend — OpenAPI 3.0 documentation.

    All monetary values are in minor units (e.g. Iraqi Dinars with no sub-unit).
  contact:
    name: Nuqta Team
  version: 1.0.0
servers:
  - url: /
tags:
  - name: Auth
    description: Authentication & registration
  - name: Users
    description: User management
  - name: Categories
    description: Product categories
  - name: Products
    description: Product catalog & stock
  - name: Sales
    description: Point-of-sale transactions
  - name: Purchases
    description: Purchase orders & receiving
  - name: Customers
    description: Customer records
  - name: Suppliers
    description: Supplier records
  - name: Customer Ledger
    description: Customer debt tracking
  - name: Supplier Ledger
    description: Supplier balance tracking
  - name: Inventory
    description: Stock movements & alerts
  - name: HR & Payroll
    description: Employee management and payroll approval
  - name: Accounting
    description: Chart of accounts & journal entries
  - name: Posting
    description: Journal entry posting workflow
  - name: Settings
    description: Application & company settings
  - name: Dashboard
    description: Aggregated metrics
paths:
  /api/v1/accounting/accounts:
    get:
      tags:
        - Accounting
      summary: List chart of accounts
      responses:
        "200":
          description: Chart of accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_400"
        "401":
          description: Unauthorized – missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_401"
        "403":
          description: Forbidden – insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_403"
        "404":
          description: Resource not found
          content:
            application/json:
              schema:
