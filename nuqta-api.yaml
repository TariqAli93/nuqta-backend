      security:
        - bearerAuth: []
  /api/v1/accounting/journal-entries:
    get:
      tags:
        - Accounting
      summary: List journal entries
      parameters:
        - name: sourceType
          in: query
          required: false
          schema:
            type: string
            enum:
              - sale
              - purchase
              - payment
              - adjustment
              - manual
        - name: dateFrom
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: isPosted
          in: query
          required: false
          schema:
            type: string
            enum:
              - "true"
              - "false"
        - name: limit
          in: query
          required: false
          schema:
            pattern: ^\d+$
            type: string
        - name: offset
          in: query
          required: false
          schema:
            pattern: ^\d+$
            type: string
      responses:
        "200":
          description: Journal entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_1"
        "400":
          description: Validation error
          content:
            application/json:
